apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: squid-full-release
on:
  workflow_dispatch:
    inputs:
      manifest:
        type: string
        required: true
        description: This is a system-generated parameter and is required for use in application releases. Refer to https://docs.cloudbees.com/docs/cloudbees-platform/latest/applications/releases#manifest for the expected format
metadata:
  stages/v1alpha1:
    - name: integ
      jobs:
        - deploy-to-integ
    - name: dev
      jobs:
        - deploy-to-dev
jobs:
  deploy-to-integ:
    steps:
      - name: Deploy to integ
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        run: echo "Deploying to integ"
  deploy-to-dev:
    needs:
      - deploy-to-integ
    steps:
      - name: Deploy to dev
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        run: echo "Deploying to dev"
