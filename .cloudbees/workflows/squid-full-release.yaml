apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: SquidStack Release Deployment
on:
  workflow_dispatch:
    inputs:
      environment:
        type: string
        required: true
        default: integ
        description: "Deployment environment (e.g. dev, integ, preprod, prod)"
      smart_tests_component:
        type: string
        required: false
        default: ""
        description: "Component that triggered this release (for E2E test linking)"
      smart_tests_build_name:
        type: string
        required: false
        default: ""
        description: "Smart Tests build name from component test job"
      manifest:
        type: string
        required: false
        default: ""
        description: "Release manifest (auto-injected by Unify from top-level manifest field)"

metadata:
  stages/v1alpha1:
    - name: Deploy Components
      jobs:
        - squid-auth
        - squid-ui
        - squid-reef-asia
        - squid-reef-eu
        - squid-feeds
        - squid-reef-na
        - squid-assets
        - squid-catalog

jobs:
  squid-auth:
    if: ${{ fromJSON(inputs.manifest)['squid-auth'] }}
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-deploy.yaml@main
    with:
      component_name: squid-auth
      version: ${{ fromJSON(inputs.manifest)['squid-auth'].version }}
      environment: ${{ inputs.environment }}
      stack_name: squid
      docker_repo: stacksdemo/squid-auth
      artifact_id: ${{ fromJSON(inputs.manifest)['squid-auth'].artifactId }}
      commit_sha: ${{ fromJSON(inputs.manifest)['squid-auth'].digest }}
      database_mode: postgres
      enable_liquibase: "true"
      feature_flags_enabled: true
    secrets: inherit
    vars: inherit

  squid-ui:
    if: ${{ fromJSON(inputs.manifest)['squid-ui'] }}
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-deploy.yaml@main
    with:
      component_name: squid-ui
      version: ${{ fromJSON(inputs.manifest)['squid-ui'].version }}
      environment: ${{ inputs.environment }}
      stack_name: squid
      docker_repo: stacksdemo/squid-ui
      artifact_id: ${{ fromJSON(inputs.manifest)['squid-ui'].artifactId }}
      commit_sha: ${{ fromJSON(inputs.manifest)['squid-ui'].digest }}
      database_mode: no-database
      enable_liquibase: "false"
      feature_flags_enabled: true
      feature_flags_secret_name: squid-ui-fmkey
      feature_flags_secret_key: FM_KEY
      feature_flags_create_secret: true
    secrets: inherit
    vars: inherit

  squid-reef-asia:
    if: ${{ fromJSON(inputs.manifest)['squid-reef-asia'] }}
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-deploy.yaml@main
