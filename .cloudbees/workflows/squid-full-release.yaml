      environment: ${{ inputs.environment }}
      stack_name: squid
      docker_repo: stacksdemo/squid-reef-asia
      artifact_id: ${{ fromJSON(inputs.manifest)['squid-reef-asia'].artifactId }}
      commit_sha: ${{ fromJSON(inputs.manifest)['squid-reef-asia'].digest }}
      database_mode: no-database
      enable_liquibase: "false"
      feature_flags_enabled: true
    secrets: inherit
    vars: inherit

  squid-reef-eu:
